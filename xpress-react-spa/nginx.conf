server {
    listen 80;
    server_name xpress.aihubproduction.com www.xpress.aihubproduction.com;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — fallback mọi route về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api → automation backend
    location /api/ {
        proxy_pass http://app:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /ai-api → ai-pipeline backend
    location /ai-api/ {
        proxy_pass http://ai_pipeline:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE config
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
