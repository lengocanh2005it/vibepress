limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

server {
    listen 80;
    server_name xpress.aihubproduction.com www.xpress.aihubproduction.com;
    root /usr/share/nginx/html;
    index index.html;

    limit_req zone=general burst=50 nodelay;

    # Block sensitive files from being served
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    # React SPA — fallback mọi route về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/deploy → automation backend (timeout dài vì deploy mất nhiều thời gian)
    location /api/deploy {
        proxy_pass http://app:5000/api/deploy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Proxy /api → automation backend
    location /api/ {
        proxy_pass http://app:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /ai-api → ai-pipeline backend
    location /ai-api/ {
        proxy_pass http://ai_pipeline:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE config
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }

    # Serve captures
    location /captures/ {
        proxy_pass http://app:5000/captures/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve artifacts
    location /artifacts/ {
        proxy_pass http://app:5000/artifacts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /assets/images/ → ai_pipeline (preview images served by Vite)
    location /assets/images/ {
        proxy_pass http://ai_pipeline:3001/assets/images/;
        proxy_set_header Host $host;
        proxy_set_header Referer $http_referer;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /preview/:pipelineId → ai_pipeline (handles Vite + Express backends)
    location /preview/ {
        proxy_pass http://ai_pipeline:3001/preview/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}

include /etc/nginx/conf.d/sites/*.conf;
